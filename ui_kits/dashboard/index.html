// ───────── Hero ─────────
function Hero({ data }) {
  const { variants, effect } = data;
  const ranked = ['A','B','C'].sort((x,y) => variants[y].mean - variants[x].mean);
  const w = variants[ranked[0]], r = variants[ranked[1]];
  return (
    <section style={hero.root}>
      <div>
        <div className="ds-eyebrow" style={{color:'var(--fg-3)', marginBottom:10}}>Relay LinkedIn campaign · pre-flight</div>
        <h1 style={hero.h}>
          Variant <span style={{color:w.color}}>{w.id}</span> wins —
          <span style={hero.hSub}> and it works across every audience segment.</span>
        </h1>
        <p style={hero.p}>
          Social proof-led copy scores <span style={hero.num}>{w.mean.toFixed(1)} / 10</span> across
          the weighted portfolio, beating ROI-led by
          <span style={hero.num}> +{(w.mean - r.mean).toFixed(2)}</span>
          {' '}(<span style={{fontFamily:'var(--font-mono)'}}>d = +{effect.cohensD.toFixed(2)}</span>, {effect.label.toLowerCase()} effect).
          The gap is statistically reliable — this isn't noise.
        </p>
      </div>
      <div>
        <div style={hero.metricsHead}>
          <span style={hero.metricsTitle}>Weighted portfolio score</span>
          <span style={hero.metricsHint}>Average persona rating · higher = more likely to convert</span>
        </div>
        <div style={hero.metrics}>
        {ranked.map((id, i) => {
          const v = variants[id];
          const rankLabel = i===0?'Winner':i===1?'Runner-up':'Third';
          return (
            <div key={id} style={{...hero.metric, borderLeftColor:v.color}}>
              <div style={hero.metricLeft}>
                <div style={hero.metricLabel}>{rankLabel}</div>
                <div style={hero.metricName}>
                  <span style={{color:v.color, fontWeight:700}}>Variant {v.id}</span>
                  <span style={hero.metricSub}> · {v.name}</span>
                </div>
                <div style={hero.metricCi}>95% CI [{v.ci[0].toFixed(2)}, {v.ci[1].toFixed(2)}]</div>
              </div>
              <div style={hero.metricRight}>
                <div style={hero.metricValue}>{v.mean.toFixed(2)}</div>
                <div style={hero.metricUnit}>/ 10</div>
              </div>
            </div>
          );
        })}
      </div>
      </div>
    </section>
  );
}
const hero = {

  metricRight: { display:'flex', alignItems:'baseline', gap:4, flexShrink:0 },
  metricValue: { fontSize:34, fontWeight:700, letterSpacing:'-0.02em', color:'var(--fg-1)', fontVariantNumeric:'tabular-nums', lineHeight:1 },

};

// ───────── Heatmap ─────────
function Heatmap({ data, activePersona, onPersonaClick }) {
  const { personas, variants, scores } = data;
  const vids = ['A','B','C'];
  const colorFor = (v) => {
    const t = Math.max(0, Math.min(1, (v - 4) / 4));
    if (t < 0.5) {
      const k = t*2;
      return `rgb(${254 - 20*k}, ${226 + 12*k}, ${194 - 20*k})`;
    } else {
      const k = (t-0.5)*2;
      return `rgb(${242 - 154*k}, ${230 - 63*k}, ${138 + 2*k})`;
    }
  };
  const personaWinners = personas.reduce((acc, p) => {
    const s = scores[p.id];
    const best = vids.reduce((a,b) => s[a] >= s[b] ? a : b);
    acc[p.id] = vids.filter(v => Math.abs(s[v] - s[best]) < 0.05);
    return acc;
  }, {});
  return (
    <section style={hm.root}>
      <div style={hm.head}>
        <div>
          <h2 style={hm.h2}>Who prefers what?</h2>
          <p style={hm.p}>Different audiences respond to different messages. Click a row to drill in.</p>
        </div>
        <div style={hm.legend}>
          <span style={hm.legText}>Low</span>
          <div style={hm.bar} />
          <span style={hm.legText}>High</span>
        </div>
      </div>
      <div style={hm.grid}>
        <div />
        {vids.map(v => (
          <div key={v} style={{...hm.col, color: variants[v].colorInk}}>
            <span style={{...hm.chip, background: variants[v].colorSoft}}>
              <span style={{...hm.chipDot, background: variants[v].color}} />
              {v} · {variants[v].name}
            </span>
          </div>
        ))}
        {personas.map(p => {
          const active = activePersona===p.id;
          return (
            <React.Fragment key={p.id}>
              <button onClick={() => onPersonaClick(p.id)} style={{...hm.rowLabel, ...(active?hm.rowLabelActive:{})}}>
                <div style={{...hm.av, background:p.accent}}>{p.name[0]}</div>
                <div style={{flex:1, textAlign:'left'}}>
                  <div style={hm.rowName}>{p.name}</div>
                  <div style={hm.rowTitle}>{p.title} · {p.weight}%</div>
                </div>
                <div style={hm.rowPrefers}>
                  prefers <span style={{fontWeight:700, color:'var(--fg-1)'}}>{personaWinners[p.id].join('/')}</span>
                </div>
              </button>
              {vids.map(v => {
                const s = scores[p.id][v];
                const isWinner = personaWinners[p.id].includes(v);
                return (
                  <div key={v} style={{...hm.cell, background: colorFor(s), ...(active && !isWinner ? {opacity:0.45} : {})}}>
                    <span style={hm.cellV}>{s.toFixed(1)}</span>
                    {isWinner && <span style={hm.star}>{'\u2605'}</span>}
                  </div>
                );
              })}
            </React.Fragment>
          );
        })}
      </div>
      <div style={hm.insight}>
        <strong>Key insight.</strong> No single variant wins every audience. Sam (Founder/CEO) scores Variant A at just
        <span style={hm.num}> 4.8</span> but gives Variant C a
        <span style={hm.num}> 7.0</span> — early-stage founders need peer validation before they consider a tool.
        Jordan responds equally well to ROI data and social proof (both <span style={hm.num}>7.8</span>).
        Taylor prefers C (<span style={hm.num}>6.8</span>) over A (<span style={hm.num}>5.2</span>) — tool influencers want social signals, not spreadsheets.
      </div>
    </section>
  );
}
const hm = {
  root: { padding:'32px 36px', borderBottom:'1px solid var(--border)' },
  head: { display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:20 },
  h2: { fontSize:26, fontWeight:700, letterSpacing:'-0.01em', margin:'0 0 6px', color:'var(--fg-1)' },

  chip: { display:'inline-flex', alignItems:'center', gap:6, padding:'4px 10px', borderRadius:999, fontSize:12, fontWeight:600 },
  chipDot: { width:6, height:6, borderRadius:'50%' },
  rowLabel: { display:'flex', alignItems:'center', gap:10, padding:'10px 12px', border:'1px solid transparent', borderRadius:8, background:'transparent', cursor:'pointer', fontFamily:'inherit', transition:'all 120ms' },

  av: { width:28, height:28, borderRadius:'50%', color:'white', fontWeight:700, fontSize:12, display:'flex', alignItems:'center', justifyContent:'center' },
  rowName: { fontSize:13, fontWeight:600, color:'var(--fg-1)' },
  rowTitle: { fontSize:11, color:'var(--fg-3)' },
  rowPrefers: { fontSize:11, color:'var(--fg-3)', fontFamily:'var(--font-mono)' },
  cell: { borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', gap:6, padding:'12px 8px', position:'relative', transition:'opacity 200ms' },

  star: { fontSize:12, color:'#0f172a' },
  insight: { padding:'14px 16px', background:'#f0f7ff', borderLeft:'4px solid #4361ee', borderRadius:'0 8px 8px 0', fontSize:13.5, lineHeight:1.55, color:'var(--fg-2)' },
  num: { fontFamily:'var(--font-mono)', fontWeight:600, color:'var(--fg-1)', fontVariantNumeric:'tabular-nums' },

// ───────── Attribution ─────────
function Attribution({ data }) {
  const { variants, attribution } = data;
  const max = 100;
  return (
    <section style={at.root}>
      <div style={at.head}>
        <h2 style={at.h2}>What makes each variant work — or fail?</h2>
        <p style={at.p}>Every ad is made of parts. Some pull readers in (green), others push them away (red). This is where we learn <em>why</em> a variant wins.</p>
      </div>
      <div style={at.cols}>
        {['A','B','C'].map(vid => {
          const v = variants[vid];
          const rows = [...attribution[vid]].sort((a,b) => b.score - a.score);
          return (
            <div key={vid} style={at.col}>
              <div style={at.colHead}>
                <div style={{...at.tag, background: v.colorSoft, color: v.colorInk}}>
                  <span style={{...at.tagDot, background: v.color}} />
                  Variant {vid}
                </div>
                <div style={at.colName}>{v.name}</div>
              </div>
              <div style={at.list}>
                {rows.map(r => {
                  const pct = Math.abs(r.score) / max;
                  const positive = r.score > 0;
                  const neutral = r.score === 0;
                  return (
                    <div key={r.id} style={at.row}>
                      <div style={at.rowLabel}>{r.label}</div>
                      <div style={at.rowBar}>
                        <div style={at.center} />
                        <div style={{
                          ...at.fill,
                          left: positive ? '50%' : `${50 - pct*50}%`,
                          width: `${pct*50}%`,
                          background: neutral ? '#cbd5e1' : positive ? '#16a34a' : '#dc2626',
                        }} />
                      </div>
                      <div style={{
                        ...at.rowVal,
                        color: neutral ? 'var(--fg-3)' : positive ? '#16a34a' : '#dc2626',
                      }}>{r.score > 0 ? '+' : ''}{r.score}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <div style={at.warning}>
        <strong>Variant B's weak spot.</strong> The <span style={at.code}>"14,000 teams"</span> social proof stat scores
        <span style={{...at.num, color:'#dc2626'}}> {'\u2212'}50</span> — the only negative-scoring element across all three variants.
        Alex and Taylor (both high-skepticism) reject it outright. B has the strongest opening hook
        in the entire evaluation, but this one line drags the whole variant down.
      </div>
    </section>
  );
}

// ───────── Minimal pairs ─────────
function MinimalPair({ data }) {
  const [pair, setPair] = useState('skepticism');
  const mp = data.minimalPairs[pair];
  const maxAbs = 120;
  return (
    <section style={mp2.root}>
      <div style={mp2.head}>
        <div>
          <h2 style={mp2.h2}>What happens when the audience changes?</h2>
          <p style={mp2.p}>Same persona, same ad — we flip one psychological dimension and measure what moves. This isolates cause from correlation.</p>
        </div>
        <div style={mp2.tabs}>
          <button onClick={() => setPair('skepticism')} style={{...mp2.tab, ...(pair==='skepticism'?mp2.tabActive:{})}}>Skepticism</button>
          <button onClick={() => setPair('pain')} style={{...mp2.tab, ...(pair==='pain'?mp2.tabActive:{})}}>Pain awareness</button>
        </div>
      </div>
      <div style={mp2.titleRow}>
        <div>
          <div style={mp2.expTitle}>{mp.title}</div>
          <div style={mp2.expSub}>{mp.explain}</div>
        </div>
        <div style={mp2.metricBlock}>
          <div style={mp2.metricL}>Willingness to act</div>
          <div style={mp2.metricV}>
            <span style={{color:'#3b82f6'}}>{mp.actionLow.toFixed(1)}</span>
            <span style={mp2.arrow}>{'\u2192'}</span>
            <span style={{color:'#ef4444'}}>{mp.actionHigh.toFixed(1)}</span>
          </div>
          <div style={mp2.metricDelta}>
            {(mp.actionHigh - mp.actionLow > 0 ? '+' : '')}
            {(mp.actionHigh - mp.actionLow).toFixed(1)} pts · {mp.low.toLowerCase()} {'\u2192'} {mp.high.toLowerCase()}
          </div>
        </div>
      </div>
      <div style={mp2.chart}>
        <div style={mp2.legend}>
          <span style={mp2.legItem}><span style={{...mp2.legDot, background:'#3b82f6'}} />{mp.low}</span>
          <span style={mp2.legItem}><span style={{...mp2.legDot, background:'#ef4444', borderRadius:0, transform:'rotate(45deg)'}} />{mp.high}</span>
          <span style={mp2.axisLabel}>Impact score — negative (hurts) to positive (helps)</span>
        </div>
        {mp.elements.map((el, i) => {
          const lowPct = 50 + (el.low / maxAbs) * 50;
          const highPct = 50 + (el.high / maxAbs) * 50;
          const minPct = Math.min(lowPct, highPct);
          const maxPct = Math.max(lowPct, highPct);
          return (
            <div key={i} style={mp2.elRow}>
              <div style={mp2.elLabel}>{el.label}</div>
              <div style={mp2.track}>
                <div style={mp2.center} />
                <div style={{...mp2.bridge, left: `${minPct}%`, width: `${maxPct - minPct}%`}} />
                <div style={{...mp2.dot, left: `${lowPct}%`, background:'#3b82f6'}} />
                <div style={{...mp2.diamond, left: `${highPct}%`, background:'#ef4444'}} />
              </div>
              <div style={mp2.elDelta}>
                <span style={{color:'#3b82f6'}}>{el.low>0?'+':''}{el.low}</span>
                <span style={{color:'var(--fg-muted)', margin:'0 4px'}}>{'\u2192'}</span>
                <span style={{color:'#ef4444'}}>{el.high>0?'+':''}{el.high}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{...mp2.insight, borderLeftColor: '#dc2626', background: '#fef2f2'}}>
        {mp.insight}
      </div>
    </section>
  );
}
const mp2 = {

  head: { display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:22 },
  h2: { fontSize:26, fontWeight:700, letterSpacing:'-0.01em', margin:'0 0 6px', color:'var(--fg-1)' },
  p: { fontSize:14, color:'var(--fg-3)', margin:0, maxWidth:620 },
  tabs: { display:'flex', gap:4, padding:4, borderRadius:10, background:'var(--bg-2)', border:'1px solid var(--border)' },
  tab: { fontFamily:'inherit', fontSize:13, fontWeight:600, padding:'6px 14px', borderRadius:7, border:'none', background:'transparent', color:'var(--fg-3)', cursor:'pointer' },
  tabActive: { background:'white', color:'var(--fg-1)', boxShadow:'0 1px 2px rgba(15,23,42,0.08)' },
  titleRow: { display:'flex', justifyContent:'space-between', alignItems:'flex-end', gap:24, marginBottom:20, padding:'16px 20px', background:'var(--bg-2)', borderRadius:10, border:'1px solid var(--border)' },
  expTitle: { fontSize:17, fontWeight:600, color:'var(--fg-1)' },
  expSub: { fontSize:13, color:'var(--fg-3)', marginTop:4, maxWidth:520, lineHeight:1.5 },
  metricBlock: { textAlign:'right', flexShrink:0 },
  metricL: { fontSize:10, fontWeight:600, color:'var(--fg-3)', textTransform:'uppercase', letterSpacing:'0.04em' },
  metricV: { display:'flex', alignItems:'baseline', gap:10, justifyContent:'flex-end', fontWeight:700, fontSize:28, fontVariantNumeric:'tabular-nums', marginTop:4 },
  arrow: { color:'var(--fg-muted)', fontSize:18 },
  metricDelta: { fontSize:11, color:'var(--fg-3)', fontFamily:'var(--font-mono)', marginTop:2 },
  chart: { padding:'20px 24px', border:'1px solid var(--border)', borderRadius:10, marginBottom:16, background:'white' },
  legend: { display:'flex', alignItems:'center', gap:18, marginBottom:14, paddingBottom:12, borderBottom:'1px solid var(--bg-3)', fontSize:12, color:'var(--fg-2)' },
  legItem: { display:'inline-flex', alignItems:'center', gap:6, fontWeight:500 },
  legDot: { width:10, height:10, borderRadius:'50%' },
  axisLabel: { marginLeft:'auto', fontSize:11, color:'var(--fg-3)', fontFamily:'var(--font-mono)' },
  elRow: { display:'grid', gridTemplateColumns:'200px 1fr 110px', alignItems:'center', gap:14, padding:'6px 0' },
  elLabel: { fontSize:12, color:'var(--fg-2)' },
  track: { position:'relative', height:18 },
  center: { position:'absolute', left:'50%', top:0, bottom:0, width:1, background:'var(--border-strong)' },
  bridge: { position:'absolute', top:'50%', height:2, background:'var(--ink-200)', transform:'translateY(-50%)' },
  dot: { position:'absolute', top:'50%', width:12, height:12, borderRadius:'50%', border:'2px solid white', transform:'translate(-50%, -50%)', boxShadow:'0 1px 3px rgba(0,0,0,0.15)' },
  diamond: { position:'absolute', top:'50%', width:12, height:12, border:'2px solid white', transform:'translate(-50%, -50%) rotate(45deg)', boxShadow:'0 1px 3px rgba(0,0,0,0.15)' },
  elDelta: { fontFamily:'var(--font-mono)', fontSize:11, textAlign:'right', fontVariantNumeric:'tabular-nums', fontWeight:600 },
  insight: { padding:'14px 16px', borderLeft:'4px solid', borderRadius:'0 8px 8px 0', fontSize:13.5, lineHeight:1.55, color:'var(--fg-2)' },
};

// ───────── Recommendations ─────────
function Recommendations({ data }) {
  const { variants } = data;
  const recs = [
    { v: 'C', title: 'Ship Variant C', body: "Wins 3 of 4 personas and ties Jordan with A. Peer-validation (Linear, Vercel, Lattice) builds trust without triggering skepticism. Scores 7.15 \u2014 the only variant above 7.", action: 'Recommended' },
    { v: 'B', title: "Fix B's proof point", body: 'B has the strongest opening in the evaluation (+100 across hook, story, pivot), but the \u201c14,000 teams\u201d stat scores \u221250. Replace with named case studies \u2014 skeptics want specifics, not aggregates.', action: 'Revise' },
    { v: 'A', title: 'Use A for ROI buyers', body: 'The math hook (+95) forces readers to verify the arithmetic \u2014 highly effective on analytical audiences like Alex (6.8). Consider A for targeted campaigns to VP/Director segments.', action: 'Segment' },
  ];
  return (
    <section style={rc.root}>
      <h2 style={rc.h2}>Recommendations</h2>
      <div style={rc.grid}>
        {recs.map(r => {
          const v = variants[r.v];
          return (
            <div key={r.v} style={{...rc.card, borderTopColor:v.color}}>
              <div style={rc.cardHead}>
                <div style={{...rc.chip, background:v.colorSoft, color:v.colorInk}}>Variant {r.v}</div>
                <div style={rc.action}>{r.action}</div>
              </div>
              <div style={rc.title}>{r.title}</div>
              <div style={rc.body}>{r.body}</div>
            </div>
          );
        })}
      </div>
    </section>
  );
}
const rc = {
  root: { padding:'32px 36px', borderBottom:'1px solid var(--border)' },
  h2: { fontSize:26, fontWeight:700, letterSpacing:'-0.01em', margin:'0 0 20px', color:'var(--fg-1)' },
  grid: { display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:16 },
  card: { padding:'18px 20px', borderRadius:12, background:'white', border:'1px solid var(--border)', borderTop:'3px solid', boxShadow:'0 1px 2px rgba(15,23,42,0.04)' },
  cardHead: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 },
  chip: { padding:'3px 10px', borderRadius:999, fontSize:11, fontWeight:700 },
  action: { fontSize:10, fontWeight:700, color:'var(--fg-3)', textTransform:'uppercase', letterSpacing:'0.06em' },
  title: { fontSize:16, fontWeight:700, color:'var(--fg-1)', marginBottom:8, letterSpacing:'-0.01em' },
  body: { fontSize:13, color:'var(--fg-2)', lineHeight:1.55 },
};

// ───────── Diagnostics ─────────
function Diagnostics({ data }) {
  const [open, setOpen] = useState(false);
  const dx = data ? data.diagnostics : {};
  const sc = dx.selfConsistency || {};
  const pd = dx.personaDiff || {};
  const pb = dx.positionBias || {};
  const cc = dx.closecall || {};
  return (
    <section style={dg.root}>
      <button onClick={() => setOpen(!open)} style={dg.toggle}>
        <span style={dg.caret}>{open ? '\u25BE' : '\u25B8'}</span>
        <span style={dg.toggleT}>{'Under the hood \u2014 diagnostics for the ML team'}</span>
        <span style={dg.toggleS}>{"Krippendorff\u2019s \u03B1 \u00B7 position bias \u00B7 persona collapse"}</span>
      </button>
      {open && (
        <div style={dg.body}>
          <div style={dg.stat}>
            <div style={dg.statL}>LLM self-consistency</div>
            <div style={dg.statV}>{(sc.mean || 0).toFixed(2)}</div>
            <div style={dg.statSub}>{sc.label || ''}</div>
          </div>
          <div style={dg.stat}>
            <div style={dg.statL}>Persona differentiation</div>
            <div style={{...dg.statV, color: (pd.mean || 0) < 0.5 ? '#dc2626' : 'var(--fg-1)'}}>
              {(pd.mean || 0).toFixed(2)}
            </div>
            <div style={dg.statSub}>{pd.label || ''} · {pd.collapsed || ''} collapsed</div>
          </div>
          <div style={dg.stat}>
            <div style={dg.statL}>Position bias</div>
            <div style={{...dg.statV, color: (pb.flagged || 0) > 0 ? '#f59e0b' : 'var(--fg-1)'}}>
              {(pb.flagged || 0) === 0 ? '\u2014' : `${pb.flagged} flagged`}
            </div>
            <div style={dg.statSub}>{(pb.flagged || 0) === 0 ? 'no elements flagged (\u03c1 < 0.3)' : pb.detail}</div>
          </div>
          <div style={dg.stat}>
            <div style={dg.statL}>Close-call detection</div>
            <div style={dg.statV}>{cc.value ? 'Yes' : 'No'}</div>
            <div style={dg.statSub}>{cc.label || ''}</div>
          </div>
        </div>
      )}
    </section>
  );
}
const dg = {
  root: { padding:'24px 36px 48px' },
  toggle: { display:'flex', alignItems:'center', gap:12, padding:'14px 18px', width:'100%', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, fontFamily:'inherit', cursor:'pointer', textAlign:'left' },

  statV: { fontSize:28, fontWeight:700, fontVariantNumeric:'tabular-nums', color:'var(--fg-1)', letterSpacing:'-0.02em', margin:'6px 0 4px' },

};

function App() {
  const [activePersona, setActivePersona] = useState(null);
  const onPersonaClick = (id) => setActivePersona(p => p === id ? null : id);
  return (
    <div className="app">
      <Sidebar data={window.DATA} activePersona={activePersona} onPersonaClick={onPersonaClick} />
      <div className="main">

        <Heatmap data={window.DATA} activePersona={activePersona} onPersonaClick={onPersonaClick} />

}
